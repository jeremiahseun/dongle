name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: dongle-darwin-arm64
          - os: macos-14
            artifact: dongle-darwin-x64
          - os: ubuntu-latest
            artifact: dongle-linux-x64

    runs-on: \${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        run: dart pub get

      - name: Build standalone binary
        run: |
          mkdir -p build
          dart compile exe bin/app.dart -o build/dongle

      - name: Create release bundle
        run: |
          mkdir -p release_pack/\${{ matrix.artifact }}
          cp build/dongle release_pack/\${{ matrix.artifact }}/dongle
          cd release_pack && tar -czf ../\${{ matrix.artifact }}.tar.gz \${{ matrix.artifact }}

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: \${{ matrix.artifact }}
          path: \${{ matrix.artifact }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries/

      - name: Prepare release files
        run: |
          mkdir -p release
          for dir in binaries/*/; do
            cp "\$dir"* release/ 2>/dev/null || true
          done
          chmod +x release/*
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: \${{ secrets.GITHUB_TOKEN }}
